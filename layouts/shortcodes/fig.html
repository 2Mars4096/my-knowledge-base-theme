{{ $src := .Get 0 }}
{{ $width := .Get 1 | default "100%" }}
{{ $caption := .Get 2 }}
<figure>
    {{ with $.Page.Resources.GetMatch $src }}
    <img src="{{ .RelPermalink }}" alt="{{ $caption | default $src }}" style="max-width: {{ $width }}; height: auto;">
    {{ else }}
    <img src="{{ $src }}" alt="{{ $caption | default $src }}" style="max-width: {{ $width }}; height: auto;">
    {{ end }}
    {{ with $caption }}<figcaption>{{ . }}</figcaption>{{ end }}
</figure>
